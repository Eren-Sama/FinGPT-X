version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # FastAPI Backend Service
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: fingpt_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATABASE_URL=sqlite+aiosqlite:///./data/fingpt.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-use-a-long-random-string}
      # Use host.docker.internal to connect to Ollama running natively on the host (Windows/Mac)
      # If running on Linux, you might need to adjust this or use the host network.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CHROMA_PERSIST_DIR=./data/chroma
    volumes:
      # Mount the data directory for persistent SQLite and ChromaDB storage
      - fingpt_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Next.js Frontend Service
  # ─────────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: fingpt_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # In Docker, the client browser needs to talk to the API. 
      # This assumes the user accesses the web app via localhost.
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_started

volumes:
  fingpt_data:
    name: fingpt_data_volume

# ─────────────────────────────────────────────────────────────────────────────
# Note on Ollama:
# FinGPT X uses the Ollama instance running natively on your host machine to 
# benefit from full GPU acceleration. Ensure `ollama serve` is running on your host
# before starting this docker-compose stack.
# ─────────────────────────────────────────────────────────────────────────────
